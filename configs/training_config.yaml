# Training configuration for task-aware object selection pipeline
# DVCon India 2026

# Dataset settings
dataset:
  root_dir: data/coco_tasks
  annotations_dir: data/annotations
  embeddings_dir: data/embeddings
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  num_workers: 4

# Training hyperparameters
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 50
  scheduler: cosine
  warmup_epochs: 5
  early_stopping_patience: 10

# Loss settings
loss:
  type: margin_ranking  # margin_ranking | bce | focal
  margin: 0.5

# Logging
logging:
  log_dir: logs/
  save_every: 5
  checkpoint_dir: checkpoints/
